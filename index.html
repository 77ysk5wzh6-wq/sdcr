<body>
    <header class="logo">
        <a href="index.html" class="logo__link">
            <img src="assets/logo.png" alt="sdcr" class="logo__image">
        </a>
    </header>

    <nav class="categories">
        <a role="button" tabindex="0" class="category category--shop"><span class="category__text">shop</span></a>
        <a role="button" tabindex="0" class="category category--look"><span class="category__text">look</span></a>
        <a role="button" tabindex="0" class="category category--about"><span class="category__text">about</span></a>

    <main class="hero">
        <img src="assets/home2.jpg" alt="home" class="hero__image">

    <section class="headline">
        <p class="headline__line"><span class="headline__word">spr</span> <span class="headline__word">spr</span> <span class="headline__word">spr</span></p>
        <p class="headline__line"><span class="headline__word">
            spruce</span> <span class="headline__word">
            sprout</span> <span class="headline__word">
            spring</span></p>

    <section class="look-page" aria-hidden="true">

    <div class="marquee" aria-hidden="true">

    <div class="look-label" aria-hidden="true">2026.6 spring</div>

    <div class="look-lightbox" aria-hidden="true">
        <div class="look-lightbox__backdrop"></div>
        <button type="button" class="look-lightbox__nav look-lightbox__nav--prev" aria-label="previous">
            <svg width="36" height="36" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="19,8 11,16 19,24"></polyline>
            </svg>
        </button>
        <div class="look-lightbox__stage">
            <img src="" alt="" class="look-lightbox__image look-lightbox__image--a is-current">
            <img src="" alt="" class="look-lightbox__image look-lightbox__image--b">
        </div>
        <button type="button" class="look-lightbox__nav look-lightbox__nav--next" aria-label="next">
            <svg width="36" height="36" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="13,8 21,16 13,24"></polyline>
            </svg>
        </button>
    </div>

    <section class="about-page" aria-hidden="true">
        <div class="about-page__inner">
            <img src="" alt="" class="about-page__image" data-src="assets/recipe.png">
            <p class="about-page__text">We are sidecar.<br>We make clothes in Seoul.<br>And sometimes drink sidecar.</p>
        </div>
        <img src="" alt="" class="about-page__signature" data-src="assets/sidecar1.png">
    </section>

    <div class="transition-overlay" aria-hidden="true"></div>
    <div class="transition-overlay transition-overlay--about" aria-hidden="true"></div>
    <div class="transition-overlay transition-overlay--shop" aria-hidden="true"></div>
    <div class="transition-overlay-text" aria-hidden="true"></div>

    <button type="button" class="mute-toggle" aria-label="sound on/off">
        <svg class="mute-toggle__icon mute-toggle__icon--on" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M11 5 6 9H3v6h3l5 4V5z"></path>
            <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
            <path d="M18 6a8 8 0 0 1 0 12"></path>
        </svg>
        <svg class="mute-toggle__icon mute-toggle__icon--off" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M11 5 6 9H3v6h3l5 4V5z"></path>
            <path d="M22 9l-6 6"></path>
            <path d="M16 9l6 6"></path>
        </svg>
    </button>

    <script>
        /* === AudioContext 레지스트리 — 생성되는 모든 컨텍스트를 추적해 첫 제스처에 일괄 resume === */
        (function () {
            var Native = window.AudioContext || window.webkitAudioContext;
            if (!Native) return;
            window.__audioContexts = [];
            function Tracked() {
                var ctx = new Native();
                window.__audioContexts.push(ctx);
                return ctx;
            }
            Tracked.prototype = Native.prototype;
            window.AudioContext = Tracked;
            window.webkitAudioContext = Tracked;
        })();

        (function () {
            try {
                if ('scrollRestoration' in history) {
                    history.scrollRestoration = 'manual';
                }
            } catch (err) {}

            requestAnimationFrame(function () {
                document.body.classList.add('is-loaded');
            });

            /* === 사운드: 음소거 토글 + 첫 제스처 언락 힌트 === */
            (function setupSound() {
                /* 저장된 음소거 상태 복원 */
                try {
                    window.__soundMuted = localStorage.getItem('sidecar-muted') === '1';
                } catch (e) { window.__soundMuted = false; }
                if (window.__soundMuted) document.body.classList.add('is-muted');

                /* 첫 사용자 제스처에 모든 AudioContext를 깨움 (브라우저 자동재생 정책) */
                /* 언락 전에는 어떤 소리도 재생하지 않음 — 안 그러면 suspended 상태에 쌓인 소리가 첫 클릭에 한꺼번에 터짐 */
                window.__soundUnlocked = false;

                function unlockAudio() {
                    if (window.__soundUnlocked) return;
                    window.__soundUnlocked = true;
                    var list = window.__audioContexts || [];
                    list.forEach(function (ctx) {
                        try { if (ctx.state === 'suspended') ctx.resume(); } catch (e) {}
                    });
                    document.removeEventListener('pointerdown', unlockAudio);
                    document.removeEventListener('keydown', unlockAudio);
                    document.removeEventListener('touchend', unlockAudio);
                }
                document.addEventListener('pointerdown', unlockAudio);
                document.addEventListener('keydown', unlockAudio);
                document.addEventListener('touchend', unlockAudio);

                /* 토글 호버 사운드 (다른 호버와 동일한 sound-hover.mp3) */
                var tglCtx = null;
                var tglHoverBuffer = null;
                (function preloadTglHover() {
                    try {
                        var AC = window.AudioContext || window.webkitAudioContext;
                        if (!AC) return;
                        tglCtx = new AC();
                        fetch('assets/sound-hover.mp3')
                            .then(function (r) { return r.arrayBuffer(); })
                            .then(function (buf) { return tglCtx.decodeAudioData(buf); })
                            .then(function (decoded) { tglHoverBuffer = decoded; })
                            .catch(function () {});
                    } catch (err) {}
                })();
                function playTglHover() {
                    if (window.__soundMuted || !window.__soundUnlocked) return;
                    if (!tglCtx || !tglHoverBuffer) return;
                    try {
                        if (tglCtx.state === 'suspended') tglCtx.resume();
                        var src = tglCtx.createBufferSource();
                        var gain = tglCtx.createGain();
                        gain.gain.value = 0.3;
                        src.buffer = tglHoverBuffer;
                        src.connect(gain);
                        gain.connect(tglCtx.destination);
                        src.start(0);
                    } catch (err) {}
                }

                /* 음소거 토글 버튼 */
                var toggle = document.querySelector('.mute-toggle');
                if (toggle) {
                    toggle.addEventListener('mouseenter', playTglHover);
                    toggle.addEventListener('click', function (e) {
                        e.stopPropagation();
                        unlockAudio();   /* 토글 클릭도 언락 제스처 */
                        window.__soundMuted = !window.__soundMuted;
                        document.body.classList.toggle('is-muted', window.__soundMuted);
                        try {
                            localStorage.setItem('sidecar-muted', window.__soundMuted ? '1' : '0');
                        } catch (err) {}
                        /* 토글 후 소리가 켜진 상태(=해제)일 때만 클릭음. playCategoryEnter가 __soundMuted 가드로 음소거 켤 땐 자동 무음 */
                        playCategoryEnter();
                    });
                }
            })();

            /* 카테고리 클릭 진입 사운드 (라이트박스 진입과 동일) */
            var catEnterCtx = null;
            var catEnterBuffer = null;
            (function preloadCatEnter() {
                try {
                    var AC = window.AudioContext || window.webkitAudioContext;
                    if (!AC) return;
                    catEnterCtx = new AC();
                    fetch('assets/sound-lightbox-open.mp3')
                        .then(function (r) { return r.arrayBuffer(); })
                        .then(function (buf) { return catEnterCtx.decodeAudioData(buf); })
                        .then(function (decoded) { catEnterBuffer = decoded; })
                        .catch(function () {});
                } catch (err) {}
            })();
            function playCategoryEnter() {
                if (window.__soundMuted || !window.__soundUnlocked) return;
                if (!catEnterCtx || !catEnterBuffer) return;
                try {
                    if (catEnterCtx.state === 'suspended') catEnterCtx.resume();
                    var src = catEnterCtx.createBufferSource();
                    var gain = catEnterCtx.createGain();
                    gain.gain.value = 0.7;
                    src.buffer = catEnterBuffer;
                    src.connect(gain);
                    gain.connect(catEnterCtx.destination);
                    src.start(0);
                } catch (err) {}
            }

            var shop = document.querySelector('.category--shop');
            if (!shop) return;
            var STRIPE_COUNT = 22;
            for (var i = 0; i < STRIPE_COUNT; i++) {
                var s = document.createElement('span');
                s.className = 'stripe';
                s.style.setProperty('--i', i);
                s.setAttribute('aria-hidden', 'true');
                shop.appendChild(s);
            }

            var look = document.querySelector('.category--look');
            if (!look) return;
            var DOT_COUNT = 4;
            for (var j = 0; j < DOT_COUNT; j++) {
                var d = document.createElement('span');
                d.className = 'dot';
                d.style.setProperty('--i', j);
                d.setAttribute('aria-hidden', 'true');
                look.appendChild(d);
            }

            var lookImages = [
                'look/look1.jpg',
                'look/look2.jpg',
                'look/look3.jpg',
                'look/look4.jpg',
                'look/look5.jpg',
                'look/look6.jpg',
                'look/look7.jpg',
                'look/look8.jpg',
                'look/look9.jpg',
                'look/look10.jpg',
                'look/look11.jpg',
                'look/look12.jpg',
                'look/look13.jpg',
                'look/look14.jpg',
                'look/look15.jpg',
                'look/look16.jpg',
                'look/look17.jpg',
                'look/look18.jpg',
                'look/look19.jpg',
                'look/look20.jpg'
            ];
            var track = document.querySelector('.marquee__track');
            var imagesInitialized = false;

            function loadLookImages() {
                if (imagesInitialized || !track) return;
                imagesInitialized = true;
                var shuffled = lookImages.slice();
                for (var s = shuffled.length - 1; s > 0; s--) {
                    var r = Math.floor(Math.random() * (s + 1));
                    var tmp = shuffled[s]; shuffled[s] = shuffled[r]; shuffled[r] = tmp;
                }
                var heights = [];
                for (var h = 0; h < shuffled.length; h++) {
                    heights.push(27 + Math.random() * 24.3);
                }
                for (var pass = 0; pass < 2; pass++) {
                    for (var k = 0; k < shuffled.length; k++) {
                        var img = document.createElement('img');
                        img.alt = '';
                        img.className = 'marquee__img';
                        img.style.height = heights[k] + 'vh';
                        img.setAttribute('aria-hidden', 'true');
                        img.onload = function () {
                            measureTrack();
                            applyTranslate();
                        };
                        img.src = encodeURI(shuffled[k]);
                        track.appendChild(img);
                    }
                }
                var verticalContainer = document.querySelector('.look-vertical');
                if (verticalContainer) {
                    var vShuffled = lookImages.slice();
                    for (var vs = vShuffled.length - 1; vs > 0; vs--) {
                        var vr = Math.floor(Math.random() * (vs + 1));
                        var vtmp = vShuffled[vs]; vShuffled[vs] = vShuffled[vr]; vShuffled[vr] = vtmp;
                    }
                    for (var v = 0; v < vShuffled.length; v++) {
                        var vimg = document.createElement('img');
                        vimg.alt = '';
                        vimg.className = 'look-vertical__img';
                        vimg.style.width = (54 + Math.random() * 21.6) + 'vw';
                        vimg.setAttribute('aria-hidden', 'true');
                        vimg.src = encodeURI(vShuffled[v]);
                        verticalContainer.appendChild(vimg);
                    }
                }
            }

            var lookPage = document.querySelector('.look-page');
            var overlay = document.querySelector('.transition-overlay');
            var oneSetWidth = 0;
            var firstImageWidth = 0;
            var initialTranslate = 0;
            function measureTrack() {
                if (!track) return;
                var imgs = track.querySelectorAll('.marquee__img');
                if (imgs.length === 0) return;
                firstImageWidth = imgs[0].offsetWidth || 0;
                var halfCount = Math.floor(imgs.length / 2);
                var total = 0;
                for (var m = 0; m < halfCount; m++) {
                    total += imgs[m].offsetWidth;
                }
                oneSetWidth = total;
                if (firstImageWidth > 0) {
                    initialTranslate = window.innerWidth - firstImageWidth / 2;
                }
            }
            window.addEventListener('load', measureTrack);
            window.addEventListener('resize', measureTrack);

            var PHASE1_SPEED = 220;
            var PHASE2_SPEED = 28;
            var SCROLL_FACTOR = 1.0;
            var autoDistance = 0;
            var phase1Done = false;
            var lastFrame = 0;
            var marqueeRunning = false;
            var tickRafId = 0;

            function applyTranslate() {
                if (oneSetWidth === 0) return;
                var totalLeft = autoDistance + (lookPage ? lookPage.scrollTop * SCROLL_FACTOR : 0);
                var rawT = initialTranslate - totalLeft;
                var translate;
                if (rawT >= 0) {
                    translate = rawT;
                } else {
                    translate = rawT % oneSetWidth;
                }
                track.style.transform = 'translateX(' + translate + 'px)';
            }

            function tick(time) {
                if (!marqueeRunning) {
                    tickRafId = 0;
                    return;
                }
                if (oneSetWidth === 0) measureTrack();
                if (lastFrame === 0) lastFrame = time;
                var dt = (time - lastFrame) / 1000;
                lastFrame = time;
                var speed = phase1Done ? PHASE2_SPEED : PHASE1_SPEED;
                autoDistance += speed * dt;
                if (!phase1Done) {
                    var totalLeft = autoDistance + (lookPage ? lookPage.scrollTop * SCROLL_FACTOR : 0);
                    if (totalLeft >= initialTranslate) phase1Done = true;
                }
                applyTranslate();
                tickRafId = requestAnimationFrame(tick);
            }

            function startMarquee() {
                if (marqueeRunning) return;
                if (tickRafId) {
                    cancelAnimationFrame(tickRafId);
                    tickRafId = 0;
                }
                measureTrack();
                autoDistance = 0;
                phase1Done = false;
                lastFrame = 0;
                applyTranslate();
                marqueeRunning = true;
                tickRafId = requestAnimationFrame(tick);
            }

            function stopMarquee() {
                marqueeRunning = false;
                if (tickRafId) {
                    cancelAnimationFrame(tickRafId);
                    tickRafId = 0;
                }
            }

            function resumeMarquee() {
                if (marqueeRunning) return;
                lastFrame = 0;
                marqueeRunning = true;
                tickRafId = requestAnimationFrame(tick);
            }

            if (lookPage) {
                lookPage.addEventListener('scroll', function () {
                    applyTranslate();
                });
            }

            var about = document.querySelector('.category--about');
            var aboutOverlay = document.querySelector('.transition-overlay--about');
            var aboutImage = document.querySelector('.about-page__image');
            var aboutImageLoaded = false;
            var shopOverlay = document.querySelector('.transition-overlay--shop');

            function loadAboutImage() {
                if (aboutImageLoaded || !aboutImage) return;
                aboutImageLoaded = true;
                var src = aboutImage.getAttribute('data-src');
                if (src) aboutImage.src = src;
                var sig = document.querySelector('.about-page__signature');
                if (sig) {
                    var sigSrc = sig.getAttribute('data-src');
                    if (sigSrc) sig.src = sigSrc;
                }
            }

            var currentPage = 'home';
            var transitioning = false;
            var overlayTextCleanupTimer = null;
            var navTimers = [];
            function navSchedule(fn, delay) {
                var id = setTimeout(function () {
                    fn();
                }, delay);
                navTimers.push(id);
                return id;
            }
            function clearNavTimers() {
                for (var i = 0; i < navTimers.length; i++) {
                    clearTimeout(navTimers[i]);
                }
                navTimers.length = 0;
            }

            try {
                if (!history.state) {
                    history.replaceState({ page: 'home' }, '', location.pathname);
                }
            } catch (err) {}

            function navigateTo(target, fromPopstate) {
                if (transitioning) return;
                if (currentPage === target) return;
                if (target !== 'look' && target !== 'about' && target !== 'shop') return;

                if (!fromPopstate) {
                    try {
                        history.pushState({ page: target }, '', '#' + target);
                    } catch (err) {}
                }

                transitioning = true;
                var oldPage = currentPage;
                var btn, ovl;
                if (target === 'look') { btn = look; ovl = overlay; }
                else if (target === 'about') { btn = about; ovl = aboutOverlay; }
                else { btn = shop; ovl = shopOverlay; }
                if (!btn || !ovl) {
                    transitioning = false;
                    return;
                }

                if (target === 'look') loadLookImages();
                if (target === 'about') loadAboutImage();

                document.body.classList.add('is-transitioning-cat');
                if (typeof window.resetAllCategoryChars === 'function') {
                    window.resetAllCategoryChars();
                }

                if (overlayTextCleanupTimer) {
                    clearTimeout(overlayTextCleanupTimer);
                    overlayTextCleanupTimer = null;
                }
                clearNavTimers();

                var catsEl = document.querySelector('.categories');
                if (catsEl) {
                    catsEl.style.transition = 'none';
                    catsEl.style.opacity = '1';
                    catsEl.offsetHeight;
                    catsEl.style.transition = '';
                }
                document.body.classList.remove('is-categories-out');

                var newClass = target === 'look' ? 'is-look-active'
                               : target === 'about' ? 'is-about-active'
                               : 'is-shop-active';
                var oldClass = oldPage === 'look' ? 'is-look-active'
                               : oldPage === 'about' ? 'is-about-active'
                               : oldPage === 'shop' ? 'is-shop-active'
                               : null;
                var isShop = target === 'shop';

                var rect = btn.getBoundingClientRect();
                var btnStyles = window.getComputedStyle(btn);
                var btnPadX = (parseFloat(btnStyles.paddingLeft) || 0) + (parseFloat(btnStyles.paddingRight) || 0);
                var naturalRect = {
                    top: rect.top,
                    left: rect.left,
                    width: rect.width,
                    height: rect.height
                };
                var textSpan = btn.querySelector('.category__text');
                if (textSpan) {
                    var textRect = textSpan.getBoundingClientRect();
                    naturalRect.width = textRect.width + btnPadX;
                }
                ovl.style.top = rect.top + 'px';
                ovl.style.left = rect.left + 'px';
                ovl.style.width = rect.width + 'px';
                ovl.style.height = rect.height + 'px';
                ovl.style.opacity = '1';
                ovl.offsetHeight;
                ovl.classList.add('is-active');

                var overlayText = document.querySelector('.transition-overlay-text');
                var overlayTextAbsolute = false;
                if (overlayText) {
                    overlayTextAbsolute = window.getComputedStyle(overlayText).position === 'absolute';
                }
                function topFor(viewportY) {
                    return overlayTextAbsolute ? viewportY + window.scrollY : viewportY;
                }
                if (overlayText) {
                    var labelHtml = '';
                    for (var ch = 0; ch < target.length; ch++) {
                        labelHtml += '<span class="transition-overlay__char">' + target.charAt(ch) + '</span>';
                    }
                    overlayText.innerHTML = labelHtml;
                    overlayText.style.transition = 'none';
                    overlayText.style.top = topFor(rect.top) + 'px';
                    overlayText.style.left = rect.left + 'px';
                    overlayText.style.width = rect.width + 'px';
                    overlayText.style.height = rect.height + 'px';
                    overlayText.style.opacity = '1';
                    overlayText.offsetHeight;
                }

                requestAnimationFrame(function () {
                    ovl.style.left = '0px';
                    ovl.style.width = '100vw';
                    if (overlayText) {
                        overlayText.style.transition = 'left 0.56s ease-in-out, width 0.56s ease-in-out';
                        overlayText.style.left = '0px';
                        overlayText.style.width = '100vw';
                    }
                });

                navSchedule(function () {
                    ovl.style.top = '0px';
                    ovl.style.height = '100vh';
                }, 630);

                navSchedule(function () {
                    if (catsEl) {
                        catsEl.style.transition = 'none';
                        catsEl.style.opacity = '';
                        catsEl.offsetHeight;
                        catsEl.style.transition = '';
                    }
                    document.body.classList.add('is-categories-out');
                    if (oldClass) document.body.classList.remove(oldClass);
                    document.body.classList.add(newClass);
                    if (!document.body.classList.contains('is-page-active')) {
                        document.body.classList.add('is-page-active');
                    }
                    window.scrollTo(0, 0);
                    if (oldPage === 'look') {
                        stopMarquee();
                        autoDistance = 0;
                        phase1Done = false;
                        lastFrame = 0;
                        if (lookPage) lookPage.scrollTop = 0;
                        if (track) track.style.transform = 'translateX(0)';
                    }
                    if (target === 'look') {
                        measureTrack();
                        applyTranslate();
                        startMarquee();
                    }
                    if (isShop) {
                        ovl.classList.add('is-sliding-out');
                    }
                    var postRect = btn.getBoundingClientRect();
                    var postStyles = window.getComputedStyle(btn);
                    var postPadX = (parseFloat(postStyles.paddingLeft) || 0) + (parseFloat(postStyles.paddingRight) || 0);
                    var postTextSpan = btn.querySelector('.category__text');
                    var postTargetWidth = postRect.width;
                    if (postTextSpan) {
                        postTargetWidth = postTextSpan.getBoundingClientRect().width + postPadX;
                    }
                    naturalRect.top = postRect.top;
                    naturalRect.left = postRect.left;
                    naturalRect.width = postTargetWidth;
                    naturalRect.height = postRect.height;
                    if (overlayText) {

                function onMove(e) {
                    pendingX = e.clientX;
                    pendingY = e.clientY;
                    if (rafId) return;
                    rafId = requestAnimationFrame(function () {
                        rafId = null;
                        if (hovering) apply(pendingX, pendingY);
                    });
                }

                labelEl.addEventListener('mouseenter', function () {
                    hovering = true;
                    measure();
                });
                labelEl.addEventListener('mousemove', onMove);
                labelEl.addEventListener('mouseleave', function () {
                    hovering = false;
                    if (rafId) {
                        cancelAnimationFrame(rafId);
                        rafId = null;
                    }
                    reset();
                });
                window.addEventListener('resize', function () {
                    if (hovering) measure();
                });
            })();

            (function setupCategoryHover() {
                var hoverNone = window.matchMedia && window.matchMedia('(hover: none)').matches;
                var narrow = window.matchMedia && window.matchMedia('(max-width: 768px)').matches;
                var hasTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
                if (hoverNone || narrow || hasTouch) return;   /* 모바일/터치: 카테고리 호버 자간 애니매이션 비활성 */
                var categoryEls = document.querySelectorAll('.category');
                if (!categoryEls.length) return;

                /* tick 사운드 (monophonic) — 카테고리 글자 이동 시 */
                var catCtx = null;
                var catTickBuffer = null;
                var catArrowBuffer = null;
                (function preloadCatTick() {
                    try {
                        var AC = window.AudioContext || window.webkitAudioContext;
                        if (!AC) return;
                        catCtx = new AC();
                        function load(url, setter) {
                            fetch(url)
                                .then(function (r) { return r.arrayBuffer(); })
                                .then(function (buf) { return catCtx.decodeAudioData(buf); })
                                .then(function (decoded) { setter(decoded); })
                                .catch(function () {});
                        }
                        load('assets/sound-text-tick.mp3', function (b) { catTickBuffer = b; });
                        load('assets/sound-hover.mp3', function (b) { catArrowBuffer = b; });
                    } catch (err) {}
                })();
                function playCatArrow() {
                    if (window.__soundMuted || !window.__soundUnlocked) return;
                    if (!catCtx || !catArrowBuffer) return;
                    try {
                        if (catCtx.state === 'suspended') catCtx.resume();
                        var src = catCtx.createBufferSource();
                        var gain = catCtx.createGain();
                        gain.gain.value = 0.3;
                        src.buffer = catArrowBuffer;
                        src.connect(gain);
                        gain.connect(catCtx.destination);
                        src.start(0);
                    } catch (err) {}
                }
                var catCurSrc = null;
                var catCurGain = null;
                function playCatTick() {
                    if (window.__soundMuted || !window.__soundUnlocked) return;
                    if (!catCtx || !catTickBuffer) return;
                    try {
                        if (catCtx.state === 'suspended') catCtx.resume();
                        var now = catCtx.currentTime;
                        if (catCurGain && catCurSrc) {
                            try {
                                catCurGain.gain.cancelScheduledValues(now);
                                catCurGain.gain.setValueAtTime(catCurGain.gain.value, now);
                                catCurGain.gain.linearRampToValueAtTime(0, now + 0.03);
                                catCurSrc.stop(now + 0.04);
                            } catch (e) {}
                        }
                        var src = catCtx.createBufferSource();
                        var gain = catCtx.createGain();
                        gain.gain.value = 0.33;
                        src.buffer = catTickBuffer;
                        src.connect(gain);
                        gain.connect(catCtx.destination);
                        src.start(0);
                        catCurSrc = src;
                        catCurGain = gain;
                    } catch (err) {}
                }
                var CAT_MOVE_THRESHOLD = 3;   /* 카테고리 글자가 이만큼 더 이동하면 tick */

                categoryEls.forEach(function (catEl) {
                    var textEl = catEl.querySelector('.category__text');
                    if (!textEl) return;
                    var text = textEl.textContent;
                    textEl.textContent = '';
                    var charEls = [];
                    for (var i = 0; i < text.length; i++) {
                        var span = document.createElement('span');
                        span.className = 'category__char';
                        span.textContent = text.charAt(i);
                        textEl.appendChild(span);
                        charEls.push(span);
                    }
                    if (!charEls.length) return;

                    var centers = [];
                    var maxPush = 6;
                    var sigma = 22;
                    var rafId = null;
                    var pendingX = 0;
                    var pendingY = 0;
                    var hovering = false;
                    var basePadL = 0;
                    var basePadR = 0;
                    var charAnchor = [];

                    function readBasePadding() {
                        var s = window.getComputedStyle(catEl);
                        basePadL = parseFloat(s.paddingLeft) || 0;
                        basePadR = parseFloat(s.paddingRight) || 0;
                    }

                    function measure() {
                        readBasePadding();
                        centers = charEls.map(function (el) {
                            var r = el.getBoundingClientRect();
                            return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
                        });
                    }

                    function apply(mx, my) {
                        if (!centers.length) return;
                        var leftMost = 0;
                        var rightMost = 0;
                        for (var i = 0; i < charEls.length; i++) {
                            var c = centers[i];
                            var dx = mx - c.x;
                            var dy = my - c.y;
                            var dist = Math.sqrt(dx * dx + dy * dy);
                            var falloff = Math.exp(-(dist * dist) / (2 * sigma * sigma));
                            var dir = dx >= 0 ? -1 : 1;
                            var push = dir * maxPush * falloff;
                            charEls[i].style.transform = 'translateX(' + push.toFixed(2) + 'px)';
                            if (push < leftMost) leftMost = push;
                            if (push > rightMost) rightMost = push;
                            /* 직전 기준 대비 임계 이상 이동 시 tick + 기준 갱신 */
                            if (charAnchor[i] === undefined) charAnchor[i] = push;
                            if (Math.abs(push - charAnchor[i]) >= CAT_MOVE_THRESHOLD) {
                                playCatTick();
                                charAnchor[i] = push;
                            }
                        }
                        catEl.style.paddingLeft = (basePadL + (-leftMost)) + 'px';
                        catEl.style.paddingRight = (basePadR + rightMost) + 'px';
                    }

                    function reset() {
                        for (var i = 0; i < charEls.length; i++) {
                            charEls[i].style.transform = 'translateX(0)';
                            charAnchor[i] = 0;
                        }
                        catEl.style.paddingLeft = '';
                        catEl.style.paddingRight = '';
                    }

                    function resetInstant() {
                        for (var i = 0; i < charEls.length; i++) {
                            var el = charEls[i];
                            el.style.transition = 'none';
                            el.style.transform = 'translateX(0)';
                            el.offsetHeight;
                            el.style.transition = '';
                        }
                        catEl.style.transition = 'none';
                        catEl.style.paddingLeft = '';
                        catEl.style.paddingRight = '';
                        catEl.offsetHeight;
                        catEl.style.transition = '';
                    }

                    catEl._headlineHoverReset = resetInstant;

                    function onMove(e) {
                        if (document.body.classList.contains('is-transitioning-cat')) return;
                        pendingX = e.clientX;
                        pendingY = e.clientY;
                        if (rafId) return;
                        rafId = requestAnimationFrame(function () {
                            rafId = null;
                            if (hovering) apply(pendingX, pendingY);
                        });
                    }

                    catEl.addEventListener('mouseenter', function () {
                        if (document.body.classList.contains('is-transitioning-cat')) return;
                        hovering = true;
                        measure();
                        playCatArrow();
                    });
                    catEl.addEventListener('mousemove', onMove);
                    catEl.addEventListener('mouseleave', function () {
                        hovering = false;
                        if (rafId) {
                            cancelAnimationFrame(rafId);
                            rafId = null;
                        }
                        reset();
                    });
                });

                window.resetAllCategoryChars = function () {
                    categoryEls.forEach(function (catEl) {
                        if (typeof catEl._headlineHoverReset === 'function') {
                            catEl._headlineHoverReset();
                        }
                    });
                };
            })();

            (function forwardMarqueeWheel() {
                var marqueeEl = document.querySelector('.marquee');
                var lookPageEl = document.querySelector('.look-page');
                if (!marqueeEl || !lookPageEl) return;
                marqueeEl.addEventListener('wheel', function (e) {
                    if (!document.body.classList.contains('is-look-active')) return;
                    lookPageEl.scrollTop += e.deltaY;
                    e.preventDefault();
                }, { passive: false });
            })();

            /* iOS 사파리 더블탭 줌 차단 — look 활성 시 빠른 두 번째 탭의 기본동작 막기 */
            (function blockDoubleTapZoom() {
                var lastTouchEnd = 0;
                document.addEventListener('touchend', function (e) {
                    if (!document.body.classList.contains('is-look-active') &&
                        !(document.querySelector('.look-lightbox') &&
                          document.querySelector('.look-lightbox').classList.contains('is-open'))) {
                        return;
                    }
                    var now = Date.now();
                    if (now - lastTouchEnd <= 250) {
                        e.preventDefault();
                    }
                    lastTouchEnd = now;
                }, { passive: false });
            })();

            (function setupHoverSound() {
                if (window.matchMedia && window.matchMedia('(hover: none)').matches) return;
                var marqueeEl = document.querySelector('.marquee');
                if (!marqueeEl) return;

                var hoverCtx = null;
                var hangBuffer = null;
                (function preload() {
                    try {
                        var AC = window.AudioContext || window.webkitAudioContext;
                        if (!AC) return;
                        hoverCtx = new AC();
                        fetch('assets/sound-hover.mp3')
                            .then(function (r) { return r.arrayBuffer(); })
                            .then(function (buf) { return hoverCtx.decodeAudioData(buf); })
                            .then(function (decoded) { hangBuffer = decoded; })
                            .catch(function () {});
                    } catch (err) {}
                })();
                function playHang() {
                    if (window.__soundMuted || !window.__soundUnlocked) return;
                    if (!hoverCtx || !hangBuffer) return;
                    try {
                        if (hoverCtx.state === 'suspended') hoverCtx.resume();
                        var src = hoverCtx.createBufferSource();
                        var gain = hoverCtx.createGain();
                        gain.gain.value = 0.39;
                        src.buffer = hangBuffer;
                        src.connect(gain);
                        gain.connect(hoverCtx.destination);
                        src.start(0);
                    } catch (err) {}
                }

                marqueeEl.addEventListener('mouseover', function (e) {
                    if (!document.body.classList.contains('is-look-active')) return;
                    var t = e.target;
                    if (t && t.classList && t.classList.contains('marquee__img')) {
                        playHang();
                    }
                });
            })();

            (function setupLookLightbox() {
                var lightbox = document.querySelector('.look-lightbox');
                if (!lightbox) return;
                var lbImgs = lightbox.querySelectorAll('.look-lightbox__image');
                var lbImgA = lbImgs[0];
                var lbImgB = lbImgs[1];
                var lbCurrent = lbImgA;   /* 현재 보이는 이미지 */
                var backdrop = lightbox.querySelector('.look-lightbox__backdrop');
                var prevBtn = lightbox.querySelector('.look-lightbox__nav--prev');
                var nextBtn = lightbox.querySelector('.look-lightbox__nav--next');

                /* 사운드 — 미리 디코드된 AudioBuffer로 즉시 재생 */
                var audioCtx = null;
                var clickBuffer = null;
                var tickBuffer = null;
                var arrowBuffer = null;
                (function preloadSounds() {
                    try {
                        var AC = window.AudioContext || window.webkitAudioContext;
                        if (!AC) return;
                        audioCtx = new AC();
                        function load(url, setter) {
                            fetch(url)
                                .then(function (r) { return r.arrayBuffer(); })
                                .then(function (buf) { return audioCtx.decodeAudioData(buf); })
                                .then(function (decoded) { setter(decoded); })
                                .catch(function () {});
                        }
                        load('assets/sound-lightbox-open.mp3', function (b) { clickBuffer = b; });
                        load('assets/sound-lightbox-nav.mp3', function (b) { tickBuffer = b; });
                        load('assets/sound-hover.mp3', function (b) { arrowBuffer = b; });
                    } catch (err) {}
                })();
                function playBuffer(buffer, volume) {
                    if (window.__soundMuted || !window.__soundUnlocked) return;
                    if (!audioCtx || !buffer) return;
                    try {
                        if (audioCtx.state === 'suspended') audioCtx.resume();
                        var src = audioCtx.createBufferSource();
                        var gain = audioCtx.createGain();
                        gain.gain.value = volume;
                        src.buffer = buffer;
                        src.connect(gain);
                        gain.connect(audioCtx.destination);
                        src.start(0);
                    } catch (err) {}
                }
                function playClickSound() { playBuffer(clickBuffer, 0.7); }
                function isTouchLb() {
                    var hoverNone = window.matchMedia && window.matchMedia('(hover: none)').matches;
                    var narrow = window.matchMedia && window.matchMedia('(max-width: 768px)').matches;
                    var hasTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
                    return hoverNone || narrow || hasTouch;
                }
                function playTickSound() {
                    /* 모바일에서는 화살표 넘김에 arrowhover, PC는 click2 첫 음 */
                    if (isTouchLb()) playBuffer(arrowBuffer, 0.3);
                    else playBuffer(tickBuffer, 0.39);
                }
                function playArrowHover() { playBuffer(arrowBuffer, 0.3); }

                var orderedSrcs = [];
                var currentIdx = -1;

                function refreshOrdered() {
                    /* 현재 화면에 실제로 보이는 컨테이너의 이미지만, src 기준 중복 제거.
                       PC=marquee(2세트 중복), 모바일=look-vertical 중 보이는 쪽만 사용. */
                    var isMobile = window.matchMedia && window.matchMedia('(max-width: 768px)').matches;
                    var selector = isMobile ? '.look-vertical__img' : '.marquee__img';
                    var imgs = document.querySelectorAll(selector);
                    var seen = {};
                    orderedSrcs = [];
                    Array.prototype.forEach.call(imgs, function (im) {
                        if (!im.src) return;
                        if (seen[im.src]) return;
                        seen[im.src] = true;
                        orderedSrcs.push(im.src);
                    });
                }

                function openLightboxBySrc(src) {
                    refreshOrdered();
                    var idx = orderedSrcs.indexOf(src);
                    playClickSound();
                    openLightboxByIdx(idx >= 0 ? idx : 0);
                }

                function openLightboxByIdx(idx) {
                    if (!orderedSrcs.length) return;
                    currentIdx = (idx + orderedSrcs.length) % orderedSrcs.length;
                    var src = orderedSrcs[currentIdx];
                    var alreadyOpen = lightbox.classList.contains('is-open');
                    if (alreadyOpen) {
                        /* 크로스페이드 — 현재 안 보이는 이미지에 새 src 깔고 동시에 교차 */
                        var incoming = (lbCurrent === lbImgA) ? lbImgB : lbImgA;
                        incoming.src = src;
                        /* 현재는 사라지고 들어오는 건 나타남 (동시) */
                        lbCurrent.classList.remove('is-current');
                        incoming.classList.add('is-current');
                        lbCurrent = incoming;
                    } else {
                        /* 처음 열 때 — current 이미지에 깔고 fade in */
                        lbCurrent = lbImgA;
                        lbImgB.classList.remove('is-current');
                        lbImgB.removeAttribute('src');
                        lbImgA.classList.add('is-current');
                        lbImgA.src = src;
                    }
                    lightbox.classList.add('is-open');
                    lightbox.setAttribute('aria-hidden', 'false');
                    if (typeof stopMarquee === 'function') stopMarquee();
                }

                function closeLightbox() {
                    playClickSound();
                    lightbox.classList.remove('is-open');
                    lightbox.setAttribute('aria-hidden', 'true');
                    setTimeout(function () {
                        if (!lightbox.classList.contains('is-open')) {
                            lbImgA.removeAttribute('src');
                            lbImgB.removeAttribute('src');
                            lbImgB.classList.remove('is-current');
                            lbImgA.classList.add('is-current');
                            lbCurrent = lbImgA;
                        }
                    }, 450);
                    if (document.body.classList.contains('is-look-active') && typeof resumeMarquee === 'function') {
                        resumeMarquee();
                    }
                }

                function showPrev() {
                    if (currentIdx < 0) return;
                    playTickSound();
                    openLightboxByIdx(currentIdx - 1);
                }
                function showNext() {
                    if (currentIdx < 0) return;
                    playTickSound();
                    openLightboxByIdx(currentIdx + 1);
                }

                if (prevBtn) prevBtn.addEventListener('click', function (e) { e.stopPropagation(); showPrev(); });
                if (nextBtn) nextBtn.addEventListener('click', function (e) { e.stopPropagation(); showNext(); });

                document.addEventListener('click', function (e) {
                    var t = e.target;
                    if (t && t.tagName === 'IMG' && (t.classList.contains('marquee__img') || t.classList.contains('look-vertical__img'))) {
                        e.preventDefault();
                        e.stopPropagation();
                        openLightboxBySrc(t.src);
                        return;
                    }
                    /* 라이트박스 열려있을 때 — 화살표 버튼이 아닌 라이트박스 내부 클릭은 닫기 */
                    if (lightbox.classList.contains('is-open') &&
                        lightbox.contains(t) &&
                        !(t.closest && t.closest('.look-lightbox__nav'))) {
                        closeLightbox();
                    }
                }, true);

                document.addEventListener('keydown', function (e) {
                    if (!lightbox.classList.contains('is-open')) return;
                    if (e.key === 'Escape') closeLightbox();
                    else if (e.key === 'ArrowLeft') showPrev();
                    else if (e.key === 'ArrowRight') showNext();
                });
            })();
        })();
    </script>
</body>
</html>
